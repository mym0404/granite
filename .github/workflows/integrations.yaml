name: Integrations

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Yarn package archives
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-cache-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-cache-

      - name: Cache Yarn PnP install state
        uses: actions/cache@v4
        with:
          path: |
            .yarn/unplugged
            .yarn/install-state.gz
            .pnp.cjs
            .pnp.loader.mjs
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'mise.toml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx
          key: ${{ runner.os }}-${{ runner.arch }}-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nx-

      - uses: ./.github/actions/setup-node-yarn
        name: Setup

      - name: Build All
        run: yarn build:all
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            tools/dist
          retention-days: 1

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Yarn package archives
        uses: actions/cache/restore@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-cache-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-cache-

      - name: Restore Yarn PnP install state
        uses: actions/cache/restore@v4
        with:
          path: |
            .yarn/unplugged
            .yarn/install-state.gz
            .pnp.cjs
            .pnp.loader.mjs
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'mise.toml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-

      - name: Restore Nx
        uses: actions/cache/restore@v4
        with:
          path: .nx
          key: ${{ runner.os }}-${{ runner.arch }}-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nx-

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
      - name: Check app catalog usage
        run: yarn check-app-catalogs
      - name: Check lint
        run: yarn lint

  type-check:
    name: Type check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Yarn package archives
        uses: actions/cache/restore@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-cache-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-cache-

      - name: Restore Yarn PnP install state
        uses: actions/cache/restore@v4
        with:
          path: |
            .yarn/unplugged
            .yarn/install-state.gz
            .pnp.cjs
            .pnp.loader.mjs
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'mise.toml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-

      - name: Restore Nx
        uses: actions/cache/restore@v4
        with:
          path: .nx
          key: ${{ runner.os }}-${{ runner.arch }}-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nx-

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
      - name: Check types
        run: yarn typecheck:all

  test-parallel:
    name: Test parallel
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Yarn package archives
        uses: actions/cache/restore@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-cache-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-cache-

      - name: Restore Yarn PnP install state
        uses: actions/cache/restore@v4
        with:
          path: |
            .yarn/unplugged
            .yarn/install-state.gz
            .pnp.cjs
            .pnp.loader.mjs
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'mise.toml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-

      - name: Restore Nx
        uses: actions/cache/restore@v4
        with:
          path: .nx
          key: ${{ runner.os }}-${{ runner.arch }}-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nx-

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
      - name: Run tests
        run: yarn test:parallel --outputStyle=static --tui=false

  test-no-parallel:
    name: Test no parallel
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Yarn package archives
        uses: actions/cache/restore@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-cache-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-cache-

      - name: Restore Yarn PnP install state
        uses: actions/cache/restore@v4
        with:
          path: |
            .yarn/unplugged
            .yarn/install-state.gz
            .pnp.cjs
            .pnp.loader.mjs
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'mise.toml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-

      - name: Restore Nx
        uses: actions/cache/restore@v4
        with:
          path: .nx
          key: ${{ runner.os }}-${{ runner.arch }}-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nx-

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
      - name: Run no-parallel tests
        run: yarn test:no-parallel --outputStyle=static --tui=false
