name: Integrations

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Yarn package archives
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-cache-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-cache-

      - name: Cache Yarn PnP install state
        uses: actions/cache@v4
        with:
          path: |
            .yarn/unplugged
            .yarn/install-state.gz
            .pnp.cjs
            .pnp.loader.mjs
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'mise.toml', '.yarn/releases/yarn-*.cjs', '.yarn/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-yarn-pnp-

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx
          key: ${{ runner.os }}-${{ runner.arch }}-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nx-

      - uses: ./.github/actions/setup-node-yarn
        name: Setup

      - name: Build All
        run: yarn build:all
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            tools/dist
          retention-days: 1

  changes:
    name: Changed files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      package_json: ${{ steps.filter.outputs.package_json }}
      license_metadata: ${{ steps.filter.outputs.license_metadata }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        name: Filter changed files
        uses: dorny/paths-filter@v4
        with:
          filters: |
            package_json:
              - "package.json"
              - "**/package.json"
            license_metadata:
              - "package.json"
              - "**/package.json"
              - "yarn.lock"
              - ".scripts/licenses.mjs"
              - ".scripts/utils/licenses.mjs"
              - ".scripts/utils/license-templates.mjs"

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
        with:
          restore_cache: "true"
          restore_nx: "true"
          download_build_artifacts: "true"
      - name: Check app catalog usage
        run: yarn check-app-catalogs
      - name: Check lint
        run: yarn lint

  license:
    name: License
    needs:
      - setup
      - changes
    if: needs.changes.outputs.license_metadata == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
        with:
          restore_cache: "true"
      - name: Check licenses
        run: yarn check-licenses
      - name: Check license notices
        run: yarn consistency-check-licenses

  package-exports:
    name: Package exports
    needs:
      - setup
      - changes
    if: needs.changes.outputs.package_json == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
        with:
          restore_cache: "true"
          restore_nx: "true"
      - name: Check package exports
        run: yarn check-exports

  type-check:
    name: Type check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
        with:
          restore_cache: "true"
          restore_nx: "true"
          download_build_artifacts: "true"
      - name: Check types
        run: yarn typecheck:all

  test-parallel:
    name: Test parallel
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
        with:
          restore_cache: "true"
          restore_nx: "true"
          download_build_artifacts: "true"
      - name: Run tests
        run: yarn test:parallel --outputStyle=static

  test-no-parallel:
    name: Test no parallel
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-yarn
        name: Setup
        with:
          restore_cache: "true"
          restore_nx: "true"
          download_build_artifacts: "true"
      - name: Run no-parallel tests
        run: yarn test:no-parallel --outputStyle=static
